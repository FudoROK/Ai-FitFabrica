services:
  api:
    build:
      context: .
    command: python -m src.main
    env_file:
      - ${APP_ENV_FILE:-.env.portable-staging.local}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: .
    command: python -m src.worker
    env_file:
      - ${APP_ENV_FILE:-.env.portable-staging.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import sys; cmdline = Path('/proc/1/cmdline').read_bytes().decode('utf-8', errors='ignore'); sys.exit(0 if 'src.worker' in cmdline else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${PORTABLE_POSTGRES_DB:-fitfabrica}
      POSTGRES_USER: ${PORTABLE_POSTGRES_USER:-fitfabrica}
      POSTGRES_PASSWORD: ${PORTABLE_POSTGRES_PASSWORD:-fitfabrica}
    ports:
      - "5432:5432"
    volumes:
      - fitfabrica_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fitfabrica_minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done &&
        mc mb --ignore-existing "local/${OBJECT_STORAGE_BUCKET_NAME:-fitfabrica-staging}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      OBJECT_STORAGE_BUCKET_NAME: ${OBJECT_STORAGE_BUCKET_NAME:-fitfabrica-staging}
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.15.2
    ports:
      - "6333:6333"
    volumes:
      - fitfabrica_qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  fitfabrica_postgres_data:
  fitfabrica_minio_data:
  fitfabrica_qdrant_data:
